name: Docker Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: my-new-project:latest
  CONTAINER_NAME: my-new-project-app
  EC2_HOST: ec2-34-235-160-0.compute-1.amazonaws.com
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

    steps:
      - name: Validate workflow values
        run: |
          test -n "$EC2_HOST" || { echo "Missing EC2 host."; exit 1; }
          test -n "$EC2_USER" || { echo "Missing EC2 user."; exit 1; }
          echo "EC2 host set to $EC2_HOST"
          echo "EC2 user set to $EC2_USER"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" .

      - name: Skip EC2 deployment when SSH key is missing
        if: ${{ env.EC2_SSH_KEY == '' }}
        run: echo "EC2_SSH_KEY is not configured, so EC2 deployment is being skipped."

      - name: Prepare SSH key file
        if: ${{ env.EC2_SSH_KEY != '' }}
        run: |
          printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' | sed '$ s/%$//' > "${RUNNER_TEMP}/ec2_key"
          chmod 600 "${RUNNER_TEMP}/ec2_key"
          ssh-keygen -yf "${RUNNER_TEMP}/ec2_key" >/dev/null || {
            echo "EC2_SSH_KEY is invalid. Re-save the private key in GitHub Secrets without extra characters."
            exit 1
          }

      - name: Copy project files to EC2
        if: ${{ env.EC2_SSH_KEY != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key_path: ${{ runner.temp }}/ec2_key
          source: ".dockerignore,Dockerfile,index.js,package.json,package-lock.json"
          target: "~/my-new-project"

      - name: Deploy to EC2
        if: ${{ env.EC2_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key_path: ${{ runner.temp }}/ec2_key
          script: |
            cd ~/my-new-project
            sudo systemctl start docker || true
            command -v docker >/dev/null || { echo "Docker is not installed on EC2"; exit 1; }
            sudo docker build -t $IMAGE_NAME .
            sudo docker stop $CONTAINER_NAME || true
            sudo docker rm $CONTAINER_NAME || true
            sudo docker run -d --restart unless-stopped --name $CONTAINER_NAME -p 3000:3000 $IMAGE_NAME
